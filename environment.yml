name: minitorch

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11

  # Native libraries — managed by conda for correct binary builds
  - numpy
  - numba
  - llvmlite=0.44.0
  - pandas>=2.0
  - networkx=3.3
  - jinja2=3.1.5
  - colorama=0.4.6

  # PyTorch — CPU only (works on all machines, no GPU required)
  # To use GPU instead, remove the next two lines and see INSTALL.md
  - pytorch::pytorch
  - pytorch::cpuonly

  # pip-managed packages
  - pip
  - pip:
    # Testing framework
    - hypothesis==6.138.2
    - pytest==8.4.1
    - pytest-env==1.1.5
    - pytest-runner==6.0.1
    - pytest-cov==5.0.0           # Test coverage reports

    # Code quality and formatting
    - black==24.10.0               # Code formatter (PEP 8)
    - mypy==1.13.0                 # Static type checker
    - flake8==7.1.1                # Style guide enforcement
    - flake8-docstrings==1.7.0     # Docstring checker
    - pep8-naming==0.14.1          # PEP 8 naming conventions
    - ruff==0.8.4                  # Fast linter (alternative to flake8)
    - pre-commit>=3.2.0           # Git hooks for code quality

    # Documentation
    - sphinx>=7.0                  # Documentation generator (optional)
    - sphinx-rtd-theme>=2.0        # ReadTheDocs theme (optional)

    # Type checking utilities
    - typing_extensions
    - types-requests               # Type stubs for requests

    # Visualization and UI
    - streamlit==1.30.0
    - streamlit-ace
    - altair==5.0.0
    - plotly>=5.0
    - watchdog==2.1.5

    # Data and ML utilities
    - datasets>=2.20.0
    - embeddings==0.0.8
    - pydot==1.4.1
    - python-mnist

    # Local package in editable mode
    - -e .
