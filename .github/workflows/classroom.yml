name: Autograding Tests

on:
  - workflow_dispatch
  - repository_dispatch
  - push

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,extra]

    - name: Lint with flake8
      id: setup
      run: |
        flake8 --ignore "N801, E203, E266, E501, W503, F812, E741, N803, N802, N806" minitorch/ tests/ project/
      continue-on-error: false

    - name: Type check with mypy
      run: |
        mypy minitorch/
      continue-on-error: true

    - name: Task 0.1
      id: task-0-1
      run: pytest -m task0_1 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Task 0.2
      id: task-0-2
      run: pytest -m task0_2 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Task 0.3
      id: task-0-3
      run: pytest -m task0_3 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Task 0.4
      id: task-0-4
      run: pytest -m task0_4 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        SETUP_RESULTS: "${{steps.setup.outcome}}"
        TASK-0-1_RESULTS: "${{steps.task-0-1.outcome}}"
        TASK-0-2_RESULTS: "${{steps.task-0-2.outcome}}"
        TASK-0-3_RESULTS: "${{steps.task-0-3.outcome}}"
        TASK-0-4_RESULTS: "${{steps.task-0-4.outcome}}"
      with:
        runners: setup,task-0-1,task-0-2,task-0-3,task-0-4
