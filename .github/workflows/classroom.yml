name: Autograding Tests

on:
  - workflow_dispatch
  - repository_dispatch
  - push

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev,extra]

    - name: Lint with flake8
      id: setup
      run: |
        flake8 --ignore "N801, E203, E266, E501, W503, F812, E741, N803, N802, N806" minitorch/ tests/ project/
      continue-on-error: false

    - name: Type check with mypy
      run: |
        mypy minitorch/
      continue-on-error: true

    - name: Task 0.1
      id: task_0_1
      run: pytest -m task0_1 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Task 0.2
      id: task_0_2
      run: pytest -m task0_2 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Task 0.3
      id: task_0_3
      run: pytest -m task0_3 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Task 0.4
      id: task_0_4
      run: pytest -m task0_4 --tb=short
      timeout-minutes: 10
      continue-on-error: false

    - name: Autograding Reporter
      if: always()
      run: |
        echo "### Autograding Results" >> $GITHUB_STEP_SUMMARY
        echo "| Task | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Setup (flake8) | ${{ steps.setup.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Task 0.1 | ${{ steps.task_0_1.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Task 0.2 | ${{ steps.task_0_2.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Task 0.3 | ${{ steps.task_0_3.outcome }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Task 0.4 | ${{ steps.task_0_4.outcome }} |" >> $GITHUB_STEP_SUMMARY

        if [[ "${{ steps.setup.outcome }}" != "success" || \
              "${{ steps.task_0_1.outcome }}" != "success" || \
              "${{ steps.task_0_2.outcome }}" != "success" || \
              "${{ steps.task_0_3.outcome }}" != "success" || \
              "${{ steps.task_0_4.outcome }}" != "success" ]]; then
          echo "One or more tasks failed."
          exit 1
        fi