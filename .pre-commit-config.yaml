# .pre-commit-config.yaml
repos:
  # ── Standard file hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: debug-statements
      - id: check-docstring-first

  # ── Ruff — fast linter + formatter ────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args:
          # Only valid ruff codes — W503 and F812 are flake8-only
          - --ignore=N801,E203,E266,E501,E741,N803,N802,N806
        types_or: [python, pyi]
        exclude: ".*\\.ipynb$"
      - id: ruff-format
        types_or: [python, pyi]
        exclude: ".*\\.ipynb$"

  # ── Flake8 — mirrors CI exactly ────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --ignore=N801,E203,E266,E501,W503,F812,E741,N803,N802,N806,E401,E402
        files: ^(minitorch|tests|project)/

  # ── Mypy — mirrors CI exactly ──────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^minitorch/
        args:
          - --ignore-missing-imports
        additional_dependencies:
          - types-requests
